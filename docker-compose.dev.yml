version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-website
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    # If you later add runtime env vars, mount them here or use an env_file.
    # env_file:
    #   - .env.production

