services:
  web:
    image: ghcr.io/amirhoseinarabhaji/personal-website:latest
    container_name: personal-website
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      SITE_URL: ${SITE_URL}
    ports:
      - "127.0.0.1:3000:3000"